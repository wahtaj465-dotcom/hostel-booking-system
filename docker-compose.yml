version: '3.8'

services:

  mongo:
    image: mongo:6
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  user-service:
    build: ./user-service
    ports:
      - "4001:4001"
    depends_on:
      - mongo

  hostel-service:
    build: ./hostel-service
    ports:
      - "4002:4002"
    depends_on:
      - mongo

  booking-service:
    build: ./booking-service
    ports:
      - "4003:4003"
    depends_on:
      - mongo
      - rabbitmq

  notification-service:
    build: ./notification-service
    ports:
      - "4004:4004"
    depends_on:
      - rabbitmq

volumes:
  mongo-data:
